[project]
name = "shared-utils"
version = "0.1.0"
description = "Shared utilities and types for Brand Sniper monorepo"
readme = "README.md"
authors = [
    { name = "criseda", email = "laurentiu.cristian.preda@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "asyncpg>=0.31.0",
    "sqlmodel>=0.0.39",
]

[build-system]
requires = ["uv_build>=0.11.26,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "pytest>=9.1.1",
    "pytest-asyncio>=1.4.0",
]
