name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  UV_PYTHON_VERSION: "3.12"

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Lint
        run: uv run ruff check

      - name: Format
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy apps/backend/ apps/listener/ apps/analytics/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-packages --group dev

      - name: Run tests
        run: uv run pytest
