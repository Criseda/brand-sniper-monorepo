global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alerting_rules.yml

scrape_configs:
  - job_name: 'sniper-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8080']

  - job_name: 'sniper-listener'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['listener:9100']

  - job_name: 'sniper-redis'
    static_configs:
      - targets: ['redis-exporter:9121']
