services:
  # ---------------------------------------------------------------------------
  # DATA LAYER: Main Application Database (Optional — uncomment for local dev)
  # By default, set DATABASE_URL in your .env to point to an external (e.g. Azure)
  # PostgreSQL instance. Uncomment the block below to run PostgreSQL locally.
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:18-alpine
  #   container_name: sniper_postgres
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: brand_sniper
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - sniper_network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # ---------------------------------------------------------------------------
  # EDGE CACHE LAYER: Volatile Sliding-Window Memory (port 6380)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: sniper_edge_redis
    command: redis-server --save "" --appendonly no
    ports:
      - "6380:6379"
    networks:
      - sniper_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ORCHESTRATION LAYER: Prefect 3.0 Core Workflow Server
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: sniper_prefect_server
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - sniper_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLOPS LAYER: MLflow Metric Tracking & Model Registry
  # ---------------------------------------------------------------------------
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v3.14.0
    container_name: sniper_mlflow_server
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --artifacts-destination /mlruns --serve-artifacts --allowed-hosts '*'
    environment:
      - PYTHONWARNINGS=ignore:::mlflow.server.fastapi_app
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    networks:
      - sniper_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILITY LAYER: Metrics and Dashboards
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sniper_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/alerting_rules.yml:/etc/prometheus/alerting_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sniper_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sniper_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - sniper_network
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: sniper_redis_exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - sniper_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started

  # ---------------------------------------------------------------------------
  # APPLICATION LAYER: Core Compute Engine REST API & FastMCP Agent Server
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../
      dockerfile: apps/backend/Dockerfile
    container_name: sniper_backend
    env_file:
      - ../../.env
      - ../../apps/backend/.env
    environment:
      - COMPUTE_NODE_IP=backend
      - REDIS_URL=redis://redis:6379
    ports:
      - "8080:8080"
    networks:
      - sniper_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ---------------------------------------------------------------------------
  # APPLICATION LAYER: Edge Telemetry Daemon & Ingestion Stream
  # ---------------------------------------------------------------------------
  listener:
    build:
      context: ../../
      dockerfile: apps/listener/Dockerfile
    container_name: sniper_listener
    env_file:
      - ../../.env
      - ../../apps/listener/.env
    environment:
      - COMPUTE_NODE_IP=backend
      - EDGE_REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - sniper_network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started

  # ---------------------------------------------------------------------------
  # APPLICATION LAYER: Macro Analytics & Adversarial CFO Pipeline  (one-shot batch job)
  # Run manually: docker compose run analytics
  # ---------------------------------------------------------------------------
  analytics:
    build:
      context: ../../
      dockerfile: apps/analytics/Dockerfile
    container_name: sniper_analytics
    profiles:
      - manual
    env_file:
      - ../../.env
      - ../../apps/analytics/.env
    environment:
      - COMPUTE_NODE_URL=http://backend:8080
      - EDGE_REDIS_URL=redis://redis:6379
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - PREFECT_API_URL=http://prefect-server:4200/api
    networks:
      - sniper_network
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_started
      mlflow-server:
        condition: service_started
      prefect-server:
        condition: service_started


# ---------------------------------------------------------------------------
# PERSISTENT STORAGE BOUNDARIES
# ---------------------------------------------------------------------------
volumes:
  # postgres_data:   # Uncomment when using local postgres service
  prefect_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  sniper_network:
    driver: bridge
