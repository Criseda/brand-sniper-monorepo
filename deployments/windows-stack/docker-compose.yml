services:
  # ---------------------------------------------------------------------------
  # DATA LAYER: Main Application Database (Optional — uncomment for local dev)
  # By default, set DATABASE_URL in your .env to point to an external (e.g. Azure)
  # PostgreSQL instance. Uncomment the block below to run PostgreSQL locally.
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: sniper_postgres
  #   environment:
  #     POSTGRES_USER: postgres
  #     POSTGRES_PASSWORD: postgres
  #     POSTGRES_DB: brand_sniper
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   networks:
  #     - sniper_network
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U postgres"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  # ---------------------------------------------------------------------------
  # ORCHESTRATION LAYER: Prefect 3.0 Core Workflow Server
  # ---------------------------------------------------------------------------
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: sniper_prefect_server
    command: prefect server start --host 0.0.0.0
    environment:
      - PREFECT_API_URL=http://localhost:4200/api
      - PREFECT_SERVER_API_HOST=0.0.0.0
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - sniper_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MLOPS LAYER: MLflow Metric Tracking & Model Registry
  # ---------------------------------------------------------------------------
  mlflow-server:
    image: ghcr.io/mlflow/mlflow:v2.14.1
    container_name: sniper_mlflow_server
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --artifacts-destination /mlruns --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlruns
    networks:
      - sniper_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # OBSERVABILITY LAYER: Metrics and Dashboards
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: sniper_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sniper_network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sniper_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - sniper_network
    restart: unless-stopped


# ---------------------------------------------------------------------------
# PERSISTENT STORAGE BOUNDARIES
# ---------------------------------------------------------------------------
volumes:
  # postgres_data:   # Uncomment when using local postgres service
  prefect_data:
  mlflow_data:
  prometheus_data:
  grafana_data:

networks:
  sniper_network:
    driver: bridge